name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RUST_TOOLCHAIN: 1.94.0
  BIN_NAME: c4-rs

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: c4-rs-linux
            binary: c4-rs
            archive: tar
          - os: macos-latest
            artifact: c4-rs-macos
            binary: c4-rs
            archive: tar
          - os: windows-latest
            artifact: c4-rs-windows
            binary: c4-rs.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Package Unix binary
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          cp README.md LICENSE "dist/${{ matrix.artifact }}/"
          tar -C dist -czf "dist/${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}"
          Copy-Item "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          Copy-Item -Path README.md, LICENSE -Destination "dist/${{ matrix.artifact }}/"
          Compress-Archive -Path "dist/${{ matrix.artifact }}/*" -DestinationPath "dist/${{ matrix.artifact }}.zip"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
